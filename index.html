<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Musée Delfosse Pascal — Artiste peintre</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0908; color: #e6ddd1; font-family: 'Georgia', 'Cormorant Garamond', serif; }
  #app { position: fixed; inset: 0; }
  canvas {
    display: block; width: 100%; height: 100%;
    /* Red crosshair cursor — always visible */
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='34' height='34' viewBox='0 0 34 34'><circle cx='17' cy='17' r='13' fill='none' stroke='%23ff2020' stroke-width='1.6'/><circle cx='17' cy='17' r='1.6' fill='%23ff2020'/><line x1='17' y1='2' x2='17' y2='12' stroke='%23ff2020' stroke-width='1.6'/><line x1='17' y1='22' x2='17' y2='32' stroke='%23ff2020' stroke-width='1.6'/><line x1='2' y1='17' x2='12' y2='17' stroke='%23ff2020' stroke-width='1.6'/><line x1='22' y1='17' x2='32' y2='17' stroke='%23ff2020' stroke-width='1.6'/></svg>") 17 17, crosshair;
  }

  #hud {
    position: fixed; left: 16px; bottom: 16px;
    background: rgba(10,9,8,0.72); border: 1px solid #3a342c;
    padding: 10px 14px; font-size: 13px; line-height: 1.5;
    max-width: 360px; pointer-events: none; backdrop-filter: blur(4px);
  }
  #hud b { color: #d7b274; letter-spacing: .05em; }
  #room-name {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 14px; letter-spacing: .25em; text-transform: uppercase;
    background: rgba(10,9,8,0.55); padding: 6px 18px; border: 1px solid #3a342c;
    pointer-events: none;
  }
  #start {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(10,9,8,0.92);
    text-align: center; padding: 24px; z-index: 5;
  }
  #start h1 { font-size: clamp(28px, 4vw, 44px); letter-spacing: .15em; margin-bottom: 6px; color: #e6ddd1; }
  #start h2 { font-size: 14px; letter-spacing: .4em; text-transform: uppercase; color: #a89a82; margin-bottom: 28px; }
  #start p { max-width: 620px; line-height: 1.6; margin-bottom: 14px; color: #c9bfa9; }
  #start .key { display: inline-block; border: 1px solid #5b5042; padding: 2px 8px; margin: 0 2px; font-family: monospace; color: #d7b274; }
  #start button {
    margin-top: 24px; padding: 12px 28px; font-size: 14px; letter-spacing: .3em;
    text-transform: uppercase; background: #3a342c; color: #e6ddd1;
    border: 1px solid #6d5e47; cursor: pointer; font-family: inherit;
  }
  #start button:hover { background: #4d4433; }
  #loading { color: #a89a82; font-size: 12px; margin-top: 20px; letter-spacing: .2em; }
  #cartel-overlay {
    position: fixed; right: 16px; bottom: 16px; max-width: 320px;
    background: rgba(10,9,8,0.82); border: 1px solid #3a342c; padding: 12px 16px;
    font-size: 13px; line-height: 1.5; display: none; pointer-events: none;
  }
  #cartel-overlay .title { color: #d7b274; font-style: italic; font-size: 15px; margin-bottom: 4px; }
  #cartel-overlay .meta { color: #a89a82; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }

  /* ==================== ADMIN PANEL ==================== */
  #admin-toggle {
    position: fixed; top: 14px; right: 14px; z-index: 9;
    width: 44px; height: 44px; border-radius: 8px;
    background: rgba(10,9,8,0.78); border: 1px solid #3a342c;
    color: #d7b274; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); transition: right .25s ease, background .15s;
  }
  #admin-toggle:hover { background: rgba(26,22,18,0.95); }

  #admin-panel {
    position: fixed; top: 0; right: -360px; bottom: 0;
    width: 340px; padding: 22px 20px 80px; overflow-y: auto;
    background: rgba(8,7,6,0.94); border-left: 1px solid #3a342c;
    color: #e6ddd1; font-family: 'Georgia', serif; font-size: 13px;
    transition: right .25s ease; z-index: 7; backdrop-filter: blur(8px);
  }
  #admin-panel.open { right: 0; }
  #admin-panel::-webkit-scrollbar { width: 8px; }
  #admin-panel::-webkit-scrollbar-thumb { background: #3a342c; border-radius: 4px; }

  .admin-title {
    font-size: 18px; color: #d7b274; letter-spacing: .15em;
    border-bottom: 1px solid #3a342c; padding-bottom: 10px; margin-bottom: 14px;
  }
  .admin-title .gear { margin-right: 6px; }
  .admin-closebtn {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(40,35,30,0.85); border: 1px solid #3a342c;
    color: #d7b274; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .admin-closebtn:hover { background: rgba(80,55,40,0.95); color: #fff; }
  .admin-section {
    margin-top: 16px; margin-bottom: 8px;
    font-size: 12px; color: #a89a82; letter-spacing: .15em; text-transform: lowercase;
  }
  .admin-btn {
    display: block; width: 100%; margin-bottom: 7px; padding: 10px 12px;
    background: rgba(40,35,30,0.6); border: 1px solid #3a342c; border-radius: 6px;
    color: #e6ddd1; font-family: inherit; font-size: 13px; text-align: center;
    cursor: pointer; transition: background .12s, border-color .12s;
  }
  .admin-btn:hover { background: rgba(70,60,48,0.85); border-color: #6d5e47; }
  .admin-btn .pill {
    display: inline-block; margin-right: 6px; font-size: 12px;
    padding: 1px 4px; border-radius: 3px; background: #3a342c; color: #d7b274;
  }
  .admin-label {
    display: block; margin-top: 14px; margin-bottom: 6px;
    font-size: 12px; color: #c9bfa9;
  }
  .admin-select, .admin-slider {
    width: 100%; background: rgba(20,17,14,0.85); border: 1px solid #3a342c;
    color: #e6ddd1; padding: 7px 10px; border-radius: 5px; font-family: inherit;
  }
  .admin-slider { padding: 0; -webkit-appearance: none; height: 6px; }
  .admin-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: #d7b274; cursor: pointer; border: 1px solid #3a342c;
  }
  .admin-slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; background: #d7b274;
    cursor: pointer; border: 1px solid #3a342c;
  }
  .admin-stats {
    background: rgba(20,17,14,0.85); border: 1px solid #3a342c; border-radius: 6px;
    padding: 10px 12px; line-height: 1.8; font-size: 12px; color: #c9bfa9;
  }
  .admin-stats b { color: #e6ddd1; }

  .music-now {
    background: rgba(20,17,14,0.85); border: 1px solid #3a342c;
    padding: 8px 12px; border-radius: 6px; margin-bottom: 8px;
    font-size: 12px; color: #d7b274; overflow: hidden; white-space: nowrap;
    text-overflow: ellipsis;
  }
  .music-row {
    display: flex; gap: 6px; margin-bottom: 6px; align-items: center;
  }
  .music-mini {
    flex: 1; padding: 8px 4px; font-size: 16px; margin: 0 !important;
  }
  .music-chk {
    flex: 1; font-size: 12px; color: #c9bfa9; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .music-chk input { accent-color: #d7b274; }

  /* ==================== PAINTING MODAL (lightbox) ==================== */
  #painting-modal {
    position: fixed; inset: 0; z-index: 10;
    background: rgba(6,5,4,0.92); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    padding: 40px; cursor: zoom-out;
  }
  #painting-modal.open { display: flex; }
  #painting-modal .frame {
    max-width: 86vw; max-height: 88vh;
    display: flex; flex-direction: column; align-items: center;
    cursor: default;
  }
  #painting-modal img {
    max-width: 86vw; max-height: 72vh; object-fit: contain;
    border: 14px solid #1a130a; box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    background: #0a0908;
  }
  #painting-modal .card {
    margin-top: 22px; max-width: 720px; text-align: center;
    color: #e6ddd1; font-family: 'Georgia', serif;
  }
  #painting-modal .meta {
    color: #d7b274; font-size: 12px; letter-spacing: .3em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  #painting-modal .title {
    font-size: 26px; font-style: italic; color: #e6ddd1; margin-bottom: 10px;
  }
  #painting-modal .desc {
    font-size: 14px; line-height: 1.6; color: #c9bfa9;
  }
  #painting-modal .sign {
    margin-top: 14px; font-size: 12px; color: #8a7f6a; letter-spacing: .15em;
  }
  #painting-modal .close {
    position: absolute; top: 18px; right: 22px;
    background: rgba(20,17,14,0.8); border: 1px solid #3a342c; border-radius: 50%;
    width: 42px; height: 42px; color: #d7b274; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #painting-modal .close:hover { background: rgba(60,50,38,0.95); }
  #painting-modal .hint {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: #8a7f6a; font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="room-name"></div>

<div id="hud">
  <div><b>Musée Delfosse Pascal</b> — Artiste peintre</div>
  <div style="color:#a89a82;font-size:11px;margin-top:4px">Approchez une œuvre pour lire le cartel.</div>
</div>

<div id="cartel-overlay">
  <div class="meta" id="cartel-num"></div>
  <div class="title" id="cartel-title"></div>
  <div id="cartel-desc"></div>
</div>

<button id="admin-toggle" title="Administration (F1 / F10)">⚙</button>
<aside id="admin-panel"></aside>

<div id="painting-modal">
  <button class="close" id="modal-close" title="Fermer (Esc)">✕</button>
  <div class="frame">
    <img id="modal-img" alt="" />
    <div class="card">
      <div class="meta" id="modal-meta"></div>
      <div class="title" id="modal-title"></div>
      <div class="desc" id="modal-desc"></div>
      <div class="sign">Delfosse Pascal — Artiste peintre</div>
    </div>
  </div>
  <div class="hint">Échap pour fermer</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
